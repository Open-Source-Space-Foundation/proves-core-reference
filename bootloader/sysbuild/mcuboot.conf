# MCUboot-image-specific Kconfig fragment (sysbuild convention:
# sysbuild/<image>.conf). The v5e board defconfig enables the USP radio
# stack (CONFIG_LORA_BASICS_MODEM_DRIVERS / CONFIG_USP), which is correct
# for the main application image but leaks into MCUboot too since both
# images share the same board defconfig. MCUboot never needs the radio
# and its build has no CONFIG_LOG, so usp_zephyr's smtc_modem_hal.c
# (which calls log_panic()) fails to link: "undefined reference to
# z_impl_log_panic". Disable the radio stack for the bootloader image
# only; disabling LORA_BASICS_MODEM_DRIVERS transitively disables USP
# (USP `depends on LORA_BASICS_MODEM_DRIVERS`).
CONFIG_LORA_BASICS_MODEM_DRIVERS=n
