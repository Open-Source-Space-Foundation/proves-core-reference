# West manifest for PROVES Core - Optimized for RP2040/RP2350 only
# This minimal manifest significantly reduces the download and setup time
# by only including modules required for Raspberry Pi RP2040/RP2350 builds

manifest:
  defaults:
    remote: upstream

  remotes:
    - name: upstream
      url-base: https://github.com/zephyrproject-rtos

  # Import filter to exclude optional groups
  group-filter: [-babblesim, -optional]

  projects:
    # Zephyr RTOS core
    - name: zephyr
      repo-path: zephyr
      revision: v4.4.1
      path: lib/zephyr-workspace/zephyr
      west-commands: scripts/west-commands.yml
      import:
        # Import specific submanifests only (instead of all submanifests)
        name-allowlist:
          - cmsis      # ARM CMSIS support (required for Cortex-M)
          - cmsis_6    # ARM CMSIS 6 support (required for RPI)
          - hal_rpi_pico  # Raspberry Pi Pico HAL (REQUIRED for RP2040/RP2350)
          - picolibc   # C library
          - mbedtls    # Crypto library
          - mcuboot    # Bootloader support
          - fatfs      # FatFS (file system) support
          - hal_st     # Required for certain sensors
          - segger     # SEGGER RTT (debug capture; inert without CONFIG_USE_SEGGER_RTT)

    - name: loramac-node
      revision: fb00b383072518c918e2258b0916c996f2d4eebe
      path: lib/zephyr-workspace/modules/lib/loramac-node

    # Core modules required for RP2040/RP2350
    - name: cmsis
      revision: 512cc7e895e8491696b61f7ba8066b4a182569b8
      path: lib/zephyr-workspace/modules/hal/cmsis
      groups:
        - hal

    - name: cmsis_6
      repo-path: CMSIS_6
      revision: 30a859f44ef8ab4dc8f84b03ed586fd16ccf9d74
      path: lib/zephyr-workspace/modules/hal/cmsis_6
      groups:
        - hal

    - name: hal_rpi_pico
      path: lib/zephyr-workspace/modules/hal/rpi_pico
      revision: 562b41e10a1d8b1a761b253b107c5c6a84cf4535
      groups:
        - hal

    - name: hal_st
      revision: 7a792882847223c72944791e0c48eed6101e6569
      path: lib/zephyr-workspace/modules/hal/st
      groups:
        - hal

    - name: picolibc
      path: lib/zephyr-workspace/modules/lib/picolibc
      revision: 01254932e8e81085817ed61fd858648584ffe37c

    # Crypto libraries (commonly used)
    - name: mbedtls
      revision: a3e190fe44c78d1ba67f55979e1257328cc7d0d8
      path: lib/zephyr-workspace/modules/crypto/mbedtls
      groups:
        - crypto

    - name: tf-psa-crypto
      revision: dc575a2ddcc8cb16275d24c42a52eaf79ebe2231
      path: lib/zephyr-workspace/modules/crypto/mbedtls/tf-psa-crypto
      groups:
        - crypto

    - name: mcuboot
      revision: 6d3b3d2c38ab20c242e5b9abb04d050086383eb2
      path: lib/zephyr-workspace/bootloader/mcuboot

    - name: fatfs
      revision: f4ead3bf4a6dab3a07d7b5f5315795c073db568d
      path: lib/zephyr-workspace/modules/fatfs

    # USP radio stack (Semtech Unified Software Platform) — v5e+ boards only.
    # usp_zephyr upstream is pinned at the commit immediately below our local
    # RF-switch patch (commit a23856a in spikes/usp_zephyr).  Two Zephyr-4.3
    # compat fixes are carried as patches (see patches/usp_zephyr-*.patch).
    - name: usp_zephyr
      url: https://github.com/Lora-net/usp_zephyr
      revision: bfacd435f53935ebea1a0e95fb877f4ede119985
      path: lib/zephyr-workspace/modules/lib/usp_zephyr

    # USP core library (LBM + RAL) — pulled by usp_zephyr at runtime.
    # Path mirrors the usp_zephyr west.yml convention (modules/lib/usp).
    - name: usp
      url: https://github.com/Lora-net/usp
      revision: 351b2015350670eb4dfa3aec35eb04433e062654
      path: lib/zephyr-workspace/modules/lib/usp

  self:
    path: .
    west-commands: west-commands.yml
