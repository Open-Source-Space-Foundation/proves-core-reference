name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: |
          make fmt

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Run Unit Tests
        run: |
          make test-unit

  build:
    runs-on: deathstar
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Create python venv
        run: |
          make fprime-venv

      - name: Setup Zephyr
        if: steps.cache-zephyr-workspace.outputs.cache-hit != 'true'
        run: |
          make zephyr-workspace

      - name: Setup Zephyr SDK
        if: steps.cache-zephyr-sdk.outputs.cache-hit != 'true'
        run: |
          make zephyr-sdk

      - name: Setup Zephyr Export
        run: |
          make zephyr-export

      - name: Install Zephyr Python Dependencies
        run: |
          make zephyr-python-deps

      - name: Change to CI Spacecraft ID
        run: |
          make make-ci-spacecraft-id

      - name: Generate
        run: |
          make generate

      - name: Set Authentication Key
        run: |
          echo "#define AUTH_DEFAULT_KEY \"${{ secrets.AUTH_KEY }}\"" > PROVESFlightControllerReference/Components/Authenticate/AuthDefaultKey.h

      - name: Build MCUBoot
        run: |
          make build-mcuboot

      - name: Build Flight Software
        run: |
          make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            mcuboot.elf
            bootable.uf2
            bootable.signed.hex
            build-fprime-automatic-zephyr/zephyr/zephyr.elf
            build-artifacts/zephyr/fprime-zephyr-deployment/dict/ReferenceDeploymentTopologyDictionary.json
          retention-days: 30

  integration:
    runs-on:
      - integration
    needs: build
    steps:
      - name: Load .env file
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            echo "$line" >> $GITHUB_ENV
          done < ~/actions-runner/.env

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6

      - name: Set up dependencies
        run: |
          make submodules fprime-venv

      - name: Set Authentication Key
        run: |
          echo "#define AUTH_DEFAULT_KEY \"${{ secrets.AUTH_KEY }}\"" > PROVESFlightControllerReference/Components/Authenticate/AuthDefaultKey.h

        # Reboot before installation to avoid watchdog reset
      - name: Reboot Integration Cube
        run: |
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1
          sleep 3

      - name: Install MCUBoot
        run: |
          ~/openocd/src/openocd -s ~/openocd/tcl -f ~/openocd/tcl/interface/cmsis-dap.cfg -f ~/openocd/tcl/target/rp2350.cfg -c "adapter speed 5000" -c "program mcuboot.elf verify reset exit"
          sleep 3

      - name: Install Flight Software
        run: |
          ~/openocd/src/openocd -s ~/openocd/tcl -f ~/openocd/tcl/interface/cmsis-dap.cfg -f ~/openocd/tcl/target/rp2350.cfg -c "adapter speed 5000" -c "program bootable.signed.hex verify reset exit"
          sleep 3

        # Reboot after installation to ensure power monitor tests work
      - name: Reboot Integration Cube
        run: |
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1

      - name: Kill all python processes
        run: |
          pkill -9 python || true

      - name: Install Framer Plugin
        run: |
          make framer-plugin

      - name: Detect Board TTY
        run: |
          echo "All serial by-id entries:"
          ls -l /dev/serial/by-id/ || true
          # Pick non-debug-probe device (exclude CMSIS-DAP / Debug_Probe / Picoprobe)
          mapfile -t CANDIDATES < <(ls /dev/serial/by-id/ 2>/dev/null \
            | grep -viE 'Debug_Probe|CMSIS-DAP|Picoprobe')
          if [ "${#CANDIDATES[@]}" -eq 0 ]; then
            echo "ERROR: no non-probe serial device found"; exit 1
          fi
          if [ "${#CANDIDATES[@]}" -gt 1 ]; then
            echo "ERROR: multiple non-probe candidates: ${CANDIDATES[*]}"; exit 1
          fi
          DEV="/dev/serial/by-id/${CANDIDATES[0]}"
          REAL=$(readlink -f "$DEV")
          echo "Selected board: $DEV -> $REAL"
          echo "UART_DEVICE=$DEV" >> $GITHUB_ENV

      - name: Start GDS
        run: |
          nohup make gds-integration UART_DEVICE="$UART_DEVICE" &
          echo $! > server.pid

      - name: Sync Sequence Number
        id: sync_seq
        run: |
          make sync-sequence-number

      - name: Probe CPU State (debug boot hang)
        if: failure() && steps.sync_seq.outcome == 'failure'
        continue-on-error: true
        run: |
          set +e
          ELF=$(find . -path "*/build-fprime-automatic-zephyr/zephyr/zephyr.elf" 2>/dev/null | head -1)
          [ -z "$ELF" ] && ELF=$(find . -name "zephyr.elf" -not -path "*/mcuboot/*" 2>/dev/null | head -1)
          echo "Using elf: $ELF"
          GDB=$(command -v arm-zephyr-eabi-gdb || command -v arm-none-eabi-gdb)
          if [ -z "$GDB" ]; then
            GDB=$(ls ~/zephyr-sdk-*/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb 2>/dev/null | head -1)
          fi
          echo "Using gdb: $GDB"
          if [ -z "$GDB" ] || [ -z "$ELF" ]; then
            echo "ERROR: missing gdb or elf — falling back to openocd-only register dump"
            ~/openocd/src/openocd -s ~/openocd/tcl \
              -f interface/cmsis-dap.cfg -f target/rp2350.cfg \
              -c "adapter speed 5000" \
              -c "init" -c "halt" -c "reg" \
              -c "mdw 0xE000ED28 4" -c "mdw 0xE000ED34 1" -c "mdw 0xE000ED38 1" \
              -c "resume" -c "exit"
            exit 0
          fi
          ~/openocd/src/openocd -s ~/openocd/tcl \
            -f interface/cmsis-dap.cfg -f target/rp2350.cfg \
            -c "adapter speed 5000" -c "init" &
          OCD_PID=$!
          sleep 3
          "$GDB" -batch -nx "$ELF" \
            -ex "set pagination off" \
            -ex "set confirm off" \
            -ex "target extended-remote localhost:3333" \
            -ex "monitor halt" \
            -ex "info threads" \
            -ex "info registers" \
            -ex "printf \"CFSR/HFSR/DFSR/MMFAR:\\n\"" \
            -ex "x/4xw 0xE000ED28" \
            -ex "printf \"BFAR:\\n\"" \
            -ex "x/1xw 0xE000ED38" \
            -ex "printf \"SHCSR:\\n\"" \
            -ex "x/1xw 0xE000ED24" \
            -ex "printf \"ICSR:\\n\"" \
            -ex "x/1xw 0xE000ED04" \
            -ex "bt full" \
            -ex "thread apply all bt" \
            -ex "monitor resume" \
            -ex "disconnect"
          kill $OCD_PID 2>/dev/null
          wait $OCD_PID 2>/dev/null
          exit 0

      - name: Run Integration Tests
        run: |
          make test-integration

      - name: Format Filesystem
        if: always()
        run: |
          make format-filesystem

      - name: Kill GDS & Power Off Satellite
        if: always()
        run: |
          kill $(cat server.pid)
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
