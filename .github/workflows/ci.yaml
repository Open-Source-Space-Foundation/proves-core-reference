name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: |
          make fmt

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Run Unit Tests
        run: |
          make test-unit

  build:
    runs-on: deathstar
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Create python venv
        run: |
          make fprime-venv

      - name: Setup Zephyr
        if: steps.cache-zephyr-workspace.outputs.cache-hit != 'true'
        run: |
          make zephyr-workspace

      - name: Setup Zephyr SDK
        if: steps.cache-zephyr-sdk.outputs.cache-hit != 'true'
        run: |
          make zephyr-sdk

      - name: Setup Zephyr Export
        run: |
          make zephyr-export

      - name: Install Zephyr Python Dependencies
        run: |
          make zephyr-python-deps

      - name: Change to CI Spacecraft ID
        run: |
          make make-ci-spacecraft-id

      - name: Generate
        run: |
          make generate

      - name: Set Authentication Key
        run: |
          echo "#define AUTH_DEFAULT_KEY \"${{ secrets.AUTH_KEY }}\"" > PROVESFlightControllerReference/Components/Authenticate/AuthDefaultKey.h

      - name: Build MCUBoot
        run: |
          make build-mcuboot

      - name: Build Flight Software
        run: |
          make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            mcuboot.elf
            bootable.uf2
            bootable.signed.hex
            build-artifacts/zephyr/fprime-zephyr-deployment/dict/ReferenceDeploymentTopologyDictionary.json
          retention-days: 30

  integration:
    runs-on:
      - integration
    needs: build
    steps:
      - name: Load .env file
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            echo "$line" >> $GITHUB_ENV
          done < ~/actions-runner/.env

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6

      - name: Set up dependencies
        run: |
          make submodules fprime-venv

      - name: Set Authentication Key
        run: |
          echo "#define AUTH_DEFAULT_KEY \"${{ secrets.AUTH_KEY }}\"" > PROVESFlightControllerReference/Components/Authenticate/AuthDefaultKey.h

        # Reboot before installation to avoid watchdog reset
      - name: Reboot Integration Cube
        run: |
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1
          sleep 3

      - name: Install MCUBoot
        run: |
          ~/openocd/src/openocd -s ~/openocd/tcl -f ~/openocd/tcl/interface/cmsis-dap.cfg -f ~/openocd/tcl/target/rp2350.cfg -c "adapter speed 5000" -c "program mcuboot.elf verify reset exit"
          sleep 3

      - name: Install Flight Software
        run: |
          ~/openocd/src/openocd -s ~/openocd/tcl -f ~/openocd/tcl/interface/cmsis-dap.cfg -f ~/openocd/tcl/target/rp2350.cfg -c "adapter speed 5000" -c "program bootable.signed.hex verify reset exit"
          sleep 3

        # Reboot after installation to ensure power monitor tests work
      - name: Reboot Integration Cube
        run: |
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1

      - name: Kill all python processes
        run: |
          pkill -9 python || true

      - name: Install Framer Plugin
        run: |
          make framer-plugin

      - name: Detect Board TTY
        run: |
          # Pick Zephyr CDC ACM by USB VID:PID 0028:000f (set in board defconfig);
          # /dev/serial/by-id does not list this device on the integration runner.
          ZEPHYR_TTY=""
          for d in /sys/bus/usb/devices/*/idVendor; do
            v=$(cat "$d" 2>/dev/null)
            p=$(cat "${d%idVendor}idProduct" 2>/dev/null)
            if [ "$v" = "0028" ] && [ "$p" = "000f" ]; then
              path=${d%/idVendor}
              for ifn in $path/*:*; do
                [ "$(cat $ifn/bInterfaceClass 2>/dev/null)" = "02" ] || continue
                tty=$(ls "$ifn/tty/" 2>/dev/null | head -1)
                [ -n "$tty" ] && { ZEPHYR_TTY="/dev/$tty"; break 2; }
              done
            fi
          done
          if [ -z "$ZEPHYR_TTY" ]; then
            echo "ERROR: Zephyr CDC ACM (0028:000f) tty not found via sysfs"
            lsusb || true
            exit 1
          fi
          echo "Selected Zephyr board tty: $ZEPHYR_TTY"
          echo "UART_DEVICE=$ZEPHYR_TTY" >> $GITHUB_ENV

      - name: Detect LoRa Passthrough TTY
        run: |
          # Find the non-Zephyr USB device's CDC data interface (CircuitPython
          # passthrough board, v5d hardware reused as ground-side LoRa receiver
          # — not the v5e flight board). Heuristic: skip the Zephyr VID:PID and
          # prefer interfaces whose iInterface descriptor contains "cdc2" or "data"
          # (CircuitPython names the data CDC "CircuitPython CDC2 *"). Falls
          # back to the last seen non-Zephyr CDC ACM tty when no name matches;
          # the smoke test asserts binary traffic to catch a wrong pick.
          PASSTHROUGH_TTY=""
          FALLBACK_TTY=""
          echo "=== USB CDC ACM candidates (non-Zephyr) ==="
          for d in /sys/bus/usb/devices/*/idVendor; do
            v=$(cat "$d" 2>/dev/null)
            p=$(cat "${d%idVendor}idProduct" 2>/dev/null)
            [ "$v" = "0028" ] && [ "$p" = "000f" ] && continue
            path=${d%/idVendor}
            prod=$(cat "$path/product" 2>/dev/null || echo "?")
            for ifn in "$path"/*:*; do
              [ "$(cat "$ifn/bInterfaceClass" 2>/dev/null)" = "02" ] || continue
              iname=$(cat "$ifn/interface" 2>/dev/null || echo "")
              tty=$(ls "$ifn/tty/" 2>/dev/null | head -1)
              [ -z "$tty" ] && continue
              echo "  $v:$p [$prod] $(basename "$ifn") '$iname' /dev/$tty"
              case "$(echo "$iname" | tr '[:upper:]' '[:lower:]')" in
                *cdc2*|*data*) PASSTHROUGH_TTY="/dev/$tty";;
              esac
              FALLBACK_TTY="/dev/$tty"
            done
          done
          [ -z "$PASSTHROUGH_TTY" ] && PASSTHROUGH_TTY="$FALLBACK_TTY"
          if [ -n "$PASSTHROUGH_TTY" ]; then
            echo "Selected LoRa passthrough tty: $PASSTHROUGH_TTY"
            echo "LORA_PASSTHROUGH_TTY=$PASSTHROUGH_TTY" >> $GITHUB_ENV
          else
            echo "No LoRa passthrough tty found; smoke test will skip"
          fi

      - name: Start GDS
        run: |
          nohup make gds-integration UART_DEVICE="$UART_DEVICE" &
          echo $! > server.pid

      - name: Sync Sequence Number
        run: |
          make sync-sequence-number

      - name: Run Integration Tests
        run: |
          make test-integration

      - name: Re-enable LoRa for RF pass
        if: env.LORA_PASSTHROUGH_TTY != ''
        run: |
          make reenable-lora || true

      - name: Kill UART GDS
        if: env.LORA_PASSTHROUGH_TTY != ''
        run: |
          kill $(cat server.pid) || true
          make delete-shadow-gds || true
          sleep 3

      - name: Start GDS on LoRa Passthrough
        if: env.LORA_PASSTHROUGH_TTY != ''
        run: |
          nohup make gds-integration UART_DEVICE="${GDS_PASSTHROUGH:-$LORA_PASSTHROUGH_TTY}" &
          echo $! > server-rf.pid
          sleep 10

      - name: Sync Sequence Number (RF)
        if: env.LORA_PASSTHROUGH_TTY != ''
        run: |
          make sync-sequence-number

      - name: Run Integration Tests over LoRa
        if: env.LORA_PASSTHROUGH_TTY != ''
        run: |
          make test-integration-radio

      - name: Format Filesystem
        if: always()
        run: |
          make format-filesystem

      - name: Kill GDS & Power Off Satellite
        if: always()
        run: |
          [ -f server.pid ] && kill $(cat server.pid) || true
          [ -f server-rf.pid ] && kill $(cat server-rf.pid) || true
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
