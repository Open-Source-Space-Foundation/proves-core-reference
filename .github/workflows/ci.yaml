name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: |
          make fmt

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Install lib dependencies
        run: |
          sudo apt update
          sudo apt install -y libmbedtls-dev

      - name: Run Unit Tests
        run: |
          make test-unit

  build:
    runs-on: deathstar
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Reset submodule working trees
        run: |
          git submodule foreach --recursive 'git checkout -- . && git clean -fd' || true

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Create python venv
        run: |
          make fprime-venv

      - name: Setup Zephyr
        if: steps.cache-zephyr-workspace.outputs.cache-hit != 'true'
        run: |
          make zephyr-workspace

      - name: Setup Zephyr SDK
        if: steps.cache-zephyr-sdk.outputs.cache-hit != 'true'
        run: |
          make zephyr-sdk

      - name: Setup Zephyr Export
        run: |
          make zephyr-export

      - name: Install Zephyr Python Dependencies
        run: |
          make zephyr-python-deps

      - name: Change to CI Spacecraft ID
        run: |
          make make-ci-spacecraft-id

      - name: Generate
        run: |
          make generate

      - name: Set Authentication Key
        env:
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
        run: |
          echo "#define AUTH_DEFAULT_KEY \"$AUTH_KEY\"" > PROVESFlightControllerReference/Components/TcSecurityDeframer/AuthDefaultKey.h

      - name: Build MCUBoot
        run: |
          make build-mcuboot

      - name: Build Flight Software
        run: |
          make build

      - name: Ensure console disabled
        # The Zephyr console shares cdc_acm_uart0 with the F' downlink; if it is
        # re-enabled, console text interleaves with the CCSDS TM frames and
        # desyncs the GDS deframer. Fail the build so this cannot reach main.
        run: |
          make check-console-disabled

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            mcuboot.elf
            bootable.uf2
            bootable.signed.hex
            build-artifacts/zephyr/fprime-zephyr-deployment
            yamcs/yamcs-data/mdb/fprime.xtce.xml
          retention-days: 30

  integration-uart:
    runs-on:
      - integration
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: artifacts
          path: .

      - name: Flash Firmware
        uses: ./.github/actions/flash-firmware

      - name: Load .env file
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            echo "$line" >> $GITHUB_ENV
          done < ~/actions-runner/.env

      - name: Reset submodule working trees
        run: |
          git submodule foreach --recursive 'git checkout -- . && git clean -fd' || true

      - name: Set up dependencies
        run: |
          make submodules fprime-venv

      - name: Apply CI spacecraft ID overrides
        run: |
          # The build job ran `make-ci-spacecraft-id` before compiling the
          # FSW, so the hex flashed onto the board emits TM frames with
          # SCID 67. The integration runner's working tree is a fresh
          # checkout (default SCID 68) so we re-apply the same override
          # here to keep the YAMCS instance config / adapter in sync.
          make make-ci-spacecraft-id

      - name: Set Authentication Key
        env:
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
        run: |
          echo "#define AUTH_DEFAULT_KEY \"$AUTH_KEY\"" > PROVESFlightControllerReference/Components/TcSecurityDeframer/AuthDefaultKey.h

      - name: Install Framer Plugin
        run: |
          make framer-plugin

      - name: Detect Board TTY
        run: |
          # Pick Zephyr CDC ACM by USB VID:PID 0028:000f (set in board defconfig);
          # /dev/serial/by-id does not list this device on the integration runner.
          ZEPHYR_TTY=$(./tools/ci/detect-board-tty.sh)
          echo "Selected Zephyr board tty: $ZEPHYR_TTY"
          echo "UART_DEVICE=$ZEPHYR_TTY" >> $GITHUB_ENV

      - name: Kill all python processes
        run: |
          pkill -9 python || true

      - name: Start GDS
        run: |
          nohup make gds-integration UART_DEVICE="$UART_DEVICE" > gds-bootstrap.log 2>&1 &
          echo $! > server.pid

      - name: Sync Sequence Number
        run: |
          make test-integration FILTER=sync_sequence_number

      - name: Format Filesystem
        run: |
          make test-integration FILTER=format_filesystem

      - name: Power-Cycle Satellite
        run: |
          [ -f server.pid ] && kill $(cat server.pid) || true
          pkill -9 python || true
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1
          sleep 3

      - name: Detect Board TTY
        run: |
          ZEPHYR_TTY=$(./tools/ci/detect-board-tty.sh)
          echo "Selected Zephyr board tty: $ZEPHYR_TTY"
          echo "UART_DEVICE=$ZEPHYR_TTY" >> $GITHUB_ENV

      - name: Start GDS
        run: |
          nohup make gds-integration UART_DEVICE="$UART_DEVICE" > gds.log 2>&1 &
          echo $! > server.pid

      - name: Sync Sequence Number
        run: |
          make test-integration FILTER=sync_sequence_number

      - name: Run UART Integration Tests
        run: |
          make test-integration

      - name: Format Filesystem
        if: always()
        run: |
          make test-integration FILTER=format_filesystem

      - name: Upload GDS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gds-log-uart
          path: |
            gds-bootstrap.log
            gds.log
            logs
            !logs/**/*.xlsx
          if-no-files-found: ignore
          retention-days: 7

      - name: Kill GDS
        if: always()
        run: |
          echo "=== python procs BEFORE kill ==="
          ps -eo pid,ppid,etimes,args | grep -iE "python|pytest" | grep -v grep || true
          [ -f server.pid ] && kill $(cat server.pid) || true
          # Release /dev/ttyBOARD so the YAMCS adapter can open it next.
          pkill -9 python || true
          fuser -k /dev/ttyBOARD 2>/dev/null || true
          sleep 2
          echo "=== python procs AFTER kill ==="
          ps -eo pid,ppid,etimes,args | grep -iE "python|pytest" | grep -v grep || true
          echo "Holders of /dev/ttyBOARD after kill (should be empty):"
          lsof /dev/ttyBOARD || true

      - name: Power-Cycle Satellite Before YAMCS
        if: always()
        run: |
          # The GDS phase can leave the board's uplink deframer holding a
          # partial TC frame (killing the GDS mid-write leaves the
          # FrameAccumulator waiting for bytes that never arrive, and the
          # detector consumes subsequent YAMCS commands silently). A power
          # cycle clears all board-side latent state so the YAMCS phase
          # starts from a known-good boot, mirroring manual bench testing
          # where YAMCS-first-after-boot always round-trips.
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1
          # Wait for the CDC ACM device to re-enumerate as /dev/ttyBOARD.
          for i in $(seq 1 30); do
            [ -e /dev/ttyBOARD ] && { echo "/dev/ttyBOARD back after ${i}s"; break; }
            sleep 1
          done
          [ -e /dev/ttyBOARD ] || { echo "ERROR: /dev/ttyBOARD did not re-enumerate"; exit 1; }
          # Give the FSW a moment to finish booting before the adapter opens the port.
          sleep 5

      - name: Restore MDB to expected path
        run: ./tools/ci/restore-yamcs-mdb.sh

      - name: Set up Java 17 for YAMCS
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Start YAMCS Stack
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # SPACECRAFT_ID=67 matches the override applied by `make
          # make-ci-spacecraft-id` in the build job so the adapter syncs on
          # the same TM frame header the FSW is emitting.
          #
          # setsid puts `make yamcs` in its own process group so teardown
          # can signal the whole group (JVM, fprime-yamcs-events,
          # proves_adapter.py) -- killing the wrapper PID alone would orphan
          # the long-lived children and leak /dev/ttyBOARD between jobs.
          setsid bash -c 'PYTHONUNBUFFERED=1 exec make yamcs UART_DEVICE=/dev/ttyBOARD SPACECRAFT_ID=67' > yamcs.log 2>&1 &
          pgid=$!
          echo "$pgid" > yamcs.pid

      - name: Wait for YAMCS HTTP API
        run: |
          for i in $(seq 1 180); do
            if curl -fsS http://localhost:8090/api/instances >/dev/null 2>&1; then
              echo "YAMCS up after ${i}s"
              break
            fi
            sleep 1
            if [ $i -eq 180 ]; then
              echo "ERROR: YAMCS did not respond on :8090 within 180s"
              tail -200 yamcs.log || true
              exit 1
            fi
          done

      - name: Wait for fprime-yamcs-events bridge subscribe
        run: |
          # Fuzzy match -- readiness signal is emitted by fprime-yamcs-events
          # at startup; pattern is loose so capitalization / punctuation
          # tweaks upstream don't silently fail this gate.
          for i in $(seq 1 60); do
            if grep -iqE 'subscrib.*tm_realtime' yamcs.log 2>/dev/null; then
              echo "Events bridge subscribed after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: fprime-yamcs-events bridge did not subscribe within 60s"
          tail -200 yamcs.log || true
          exit 1

      - name: Run YAMCS Round-Trip Test
        run: |
          make test-yamcs

      - name: Dump YAMCS log on failure
        if: failure()
        run: |
          echo "===== yamcs.log (tail 1500) ====="
          tail -1500 yamcs.log || true
          echo "===== lsof /dev/ttyBOARD ====="
          lsof /dev/ttyBOARD || true

      - name: Dump YAMCS archive diagnostics on failure
        if: failure()
        run: |
          # Discriminate uplink-dead vs downlink/decode-dead:
          # if CommandsDispatched grew during the test, the board received and
          # executed the NO_OPs and the fault is in the TM/event path; if it
          # never updated, the uplink died before the command dispatcher.
          echo "===== packets received by YAMCS (last 50) ====="
          curl -fsS "http://localhost:8090/api/archive/fprime-project/packets?limit=50&order=desc" || true
          echo ""
          echo "===== CommandsDispatched parameter samples ====="
          curl -fsS "http://localhost:8090/api/archive/fprime-project/parameters/ReferenceDeployment_ReferenceDeployment/CdhCore/cmdDisp/CommandsDispatched/samples" || true
          echo ""
          echo "===== data link stats ====="
          curl -fsS "http://localhost:8090/api/links/fprime-project" || true
          echo ""
          echo "===== YAMCS events (last 50) ====="
          curl -fsS "http://localhost:8090/api/archive/fprime-project/events?limit=50&order=desc" || true

      - name: Stop YAMCS Stack
        if: always()
        run: |
          # yamcs.pid contains the process-group leader PID from `setsid`,
          # so kill the whole group to take JVM/events/adapter children with it.
          pgid=$(cat yamcs.pid 2>/dev/null || true)
          if [ -n "$pgid" ]; then
            kill -TERM -- "-$pgid" 2>/dev/null || true
            sleep 2
            kill -KILL -- "-$pgid" 2>/dev/null || true
          fi
          make yamcs-stop || true

      - name: Upload YAMCS log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yamcs-log
          path: yamcs.log
          retention-days: 7

      - name: Power Off Satellite
        if: always()
        run: |
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0

  integration-radio:
    runs-on:
      - integration
    needs:
      - build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: artifacts
          path: .

      - name: Flash Firmware
        uses: ./.github/actions/flash-firmware

      - name: Load .env file
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            echo "$line" >> $GITHUB_ENV
          done < ~/actions-runner/.env

      - name: Reset submodule working trees
        run: |
          git submodule foreach --recursive 'git checkout -- . && git clean -fd' || true

      - name: Set up dependencies
        run: |
          make submodules fprime-venv

      - name: Set Authentication Key
        env:
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
        run: |
          echo "#define AUTH_DEFAULT_KEY \"$AUTH_KEY\"" > PROVESFlightControllerReference/Components/TcSecurityDeframer/AuthDefaultKey.h

      - name: Install Framer Plugin
        run: |
          make framer-plugin

      - name: Detect Zephyr UART TTY
        run: |
          # Pick Zephyr CDC ACM by USB VID:PID 0028:000f (set in board defconfig);
          # /dev/serial/by-id does not list this device on the integration runner.
          ZEPHYR_TTY=$(./tools/ci/detect-board-tty.sh)
          echo "Selected Zephyr board tty: $ZEPHYR_TTY"
          echo "UART_DEVICE=$ZEPHYR_TTY" >> $GITHUB_ENV

      - name: Bootstrap Sequence Number over UART
        run: |
          # DIVIDER_PRM_SET and lora.TRANSMIT both pass through the authentication
          # router and require the GDS-side sequence number to match FSW. On a
          # fresh boot the seq number is unsynced, so the LoRa bootstrap commands
          # would silently fail auth and never enable the radio. Run the sync
          # test over UART first to align the local sequence_number.bin used by
          # the framer plugin, then the LoRa GDS that follows can authenticate.
          # Tracked by #400: long-term, make radio bootstrap commands auth-exempt
          # (or align seq-number out-of-band over RF) so this UART pre-step can go away.
          pkill -9 python || true
          nohup make gds-integration UART_DEVICE="$UART_DEVICE" > gds-bootstrap.log 2>&1 &
          BOOTSTRAP_GDS_PID=$!
          echo $BOOTSTRAP_GDS_PID > server-bootstrap.pid
          sleep 5
          # Sync against the LoRa deframer instance: the radio traffic that
          # follows is validated by it, not by the UART instance this
          # bootstrap link talks through.
          make test-integration FILTER=sync_sequence_number PYTEST_ARGS=--sync-deframer=lora
          make test-integration FILTER=format_filesystem
          kill $BOOTSTRAP_GDS_PID 2>/dev/null || true
          rm -f server-bootstrap.pid

      - name: Power-Cycle Satellite
        run: |
          pkill -9 python || true
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1
          sleep 3

      - name: Detect Zephyr UART TTY
        run: |
          ZEPHYR_TTY=$(./tools/ci/detect-board-tty.sh)
          echo "Selected Zephyr board tty: $ZEPHYR_TTY"
          echo "UART_DEVICE=$ZEPHYR_TTY" >> $GITHUB_ENV

      - name: Sync Sequence Number over UART
        run: |
          nohup make gds-integration UART_DEVICE="$UART_DEVICE" > gds-sync.log 2>&1 &
          BOOTSTRAP_GDS_PID=$!
          echo $BOOTSTRAP_GDS_PID > server-bootstrap.pid
          sleep 5
          make test-integration FILTER=sync_sequence_number PYTEST_ARGS=--sync-deframer=lora
          kill $BOOTSTRAP_GDS_PID 2>/dev/null || true
          rm -f server-bootstrap.pid

      - name: Detect LoRa Passthrough TTY
        run: |
          # Find the non-Zephyr USB device's CDC data interface (CircuitPython
          # passthrough board, v5d hardware reused as ground-side LoRa receiver
          # — not the v5e flight board). Heuristic: skip the Zephyr VID:PID and
          # prefer interfaces whose iInterface descriptor contains "cdc2" or "data"
          # (CircuitPython names the data CDC "CircuitPython CDC2 *"). Falls
          # back to the last seen non-Zephyr CDC ACM tty when no name matches;
          # the smoke test asserts binary traffic to catch a wrong pick.
          PASSTHROUGH_TTY=""
          FALLBACK_TTY=""
          echo "=== USB CDC ACM candidates (non-Zephyr) ==="
          for d in /sys/bus/usb/devices/*/idVendor; do
            v=$(cat "$d" 2>/dev/null)
            p=$(cat "${d%idVendor}idProduct" 2>/dev/null)
            [ "$v" = "0028" ] && [ "$p" = "000f" ] && continue
            path=${d%/idVendor}
            prod=$(cat "$path/product" 2>/dev/null || echo "?")
            for ifn in "$path"/*:*; do
              [ "$(cat "$ifn/bInterfaceClass" 2>/dev/null)" = "02" ] || continue
              iname=$(cat "$ifn/interface" 2>/dev/null || echo "")
              tty=$(ls "$ifn/tty/" 2>/dev/null | head -1)
              [ -z "$tty" ] && continue
              echo "  $v:$p [$prod] $(basename "$ifn") '$iname' /dev/$tty"
              case "$(echo "$iname" | tr '[:upper:]' '[:lower:]')" in
                *cdc2*|*data*) PASSTHROUGH_TTY="/dev/$tty";;
              esac
              FALLBACK_TTY="/dev/$tty"
            done
          done
          [ -z "$PASSTHROUGH_TTY" ] && PASSTHROUGH_TTY="$FALLBACK_TTY"
          if [ -z "$PASSTHROUGH_TTY" ]; then
            echo "ERROR: LoRa passthrough tty not found; cannot run radio integration tests"
            lsusb || true
            exit 1
          fi
          echo "Selected LoRa passthrough tty: $PASSTHROUGH_TTY"
          echo "LORA_PASSTHROUGH_TTY=$PASSTHROUGH_TTY" >> $GITHUB_ENV

      - name: Kill all python processes
        run: |
          pkill -9 python || true

      - name: Start GDS on LoRa Passthrough
        run: |
          # Capture GDS's own stdout/stderr for the whole session (not just what
          # pytest captures on failure) so a crash mid-run has a full record of
          # every EVR/telemetry line GDS saw, uploaded as the gds-console-log artifact.
          nohup make gds-integration UART_DEVICE="${GDS_PASSTHROUGH:-$LORA_PASSTHROUGH_TTY}" > gds-rf.log 2>&1 &
          GDS_RF_PID=$!
          echo $GDS_RF_PID > server-rf.pid
          for i in $(seq 1 15); do
            sleep 1
            kill -0 $GDS_RF_PID 2>/dev/null || { echo "RF GDS process (PID $GDS_RF_PID) exited unexpectedly during startup. Check gds-rf.log for details."; exit 1; }
          done

      - name: Sync Sequence Number
        env:
          TLM_SAMPLE_LOG: tlm_sample_sync.csv
        run: |
          make test-integration FILTER=sync_sequence_number PYTEST_ARGS=--with-radio

      - name: Run Radio Integration Tests
        env:
          TLM_SAMPLE_LOG: tlm_sample_radio.csv
        run: |
          make test-integration FILTER="not sync_sequence_number and not format_filesystem and not uart_only" PYTEST_ARGS=--with-radio

      - name: Format Filesystem
        if: always()
        env:
          TLM_SAMPLE_LOG: tlm_sample_format.csv
        run: |
          make test-integration FILTER=format_filesystem PYTEST_ARGS=--with-radio

      - name: Upload telemetry sample logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radio-tlm-samples
          path: tlm_sample_*.csv
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload GDS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gds-log-radio
          path: |
            gds-bootstrap.log
            gds-sync.log
            gds-rf.log
            logs
            !logs/**/*.xlsx
          if-no-files-found: ignore
          retention-days: 7

      - name: Kill GDS & Power Off Satellite
        if: always()
        run: |
          [ -f server.pid ] && kill $(cat server.pid) || true
          [ -f server-rf.pid ] && kill $(cat server-rf.pid) || true
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0

  yamcs-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: artifacts

      - name: Restore MDB to expected path
        run: ./tools/ci/restore-yamcs-mdb.sh

      - name: Validate YAMCS server boots with current MDB
        run: |
          make yamcs-build-check

      - name: Capture compose state on failure
        if: failure()
        run: |
          docker compose -f yamcs/docker-compose.yml ps > yamcs-compose-ps.txt 2>&1 || true
          docker compose -f yamcs/docker-compose.yml logs --tail=500 > yamcs-compose-logs.txt 2>&1 || true

      - name: Upload compose state on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: yamcs-build-compose-state
          path: |
            yamcs-compose-ps.txt
            yamcs-compose-logs.txt
          retention-days: 7
