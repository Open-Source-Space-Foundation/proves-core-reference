name: ci

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: |
          make fmt

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Run Unit Tests
        run: |
          make test-unit

  build:
    runs-on: deathstar
    steps:
      - uses: actions/checkout@v6

      - name: Download bin tools
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: |
          make download-bin

      - name: Setup submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          make submodules

      - name: Create python venv
        run: |
          make fprime-venv

      - name: Setup Zephyr
        if: steps.cache-zephyr-workspace.outputs.cache-hit != 'true'
        run: |
          make zephyr-workspace

      - name: Setup Zephyr SDK
        if: steps.cache-zephyr-sdk.outputs.cache-hit != 'true'
        run: |
          make zephyr-sdk

      - name: Setup Zephyr Export
        run: |
          make zephyr-export

      - name: Install Zephyr Python Dependencies
        run: |
          make zephyr-python-deps

      - name: Change to CI Spacecraft ID
        run: |
          make make-ci-spacecraft-id

      - name: Generate
        run: |
          make generate

      - name: Set Authentication Key
        run: |
          echo "#define AUTH_DEFAULT_KEY \"${{ secrets.AUTH_KEY }}\"" > PROVESFlightControllerReference/Components/Authenticate/AuthDefaultKey.h

      - name: Build MCUBoot
        run: |
          make build-mcuboot

      - name: Build Flight Software
        run: |
          make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            mcuboot.elf
            bootable.uf2
            bootable.signed.hex
            build-artifacts/zephyr/fprime-zephyr-deployment/dict/ReferenceDeploymentTopologyDictionary.json
            yamcs/yamcs-data/mdb/fprime.xtce.xml
          retention-days: 30

  integration:
    runs-on:
      - integration
    needs: build
    steps:
      - name: Load .env file
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            echo "$line" >> $GITHUB_ENV
          done < ~/actions-runner/.env

      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6

      - name: Set up dependencies
        run: |
          make submodules fprime-venv

      - name: Set Authentication Key
        run: |
          echo "#define AUTH_DEFAULT_KEY \"${{ secrets.AUTH_KEY }}\"" > PROVESFlightControllerReference/Components/Authenticate/AuthDefaultKey.h

        # Reboot before installation to avoid watchdog reset
      - name: Reboot Integration Cube
        if: env.KORAD_CONTROL == 'true'
        run: |
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1
          sleep 3

      - name: Install MCUBoot
        run: |
          ~/openocd/src/openocd -s ~/openocd/tcl -f ~/openocd/tcl/interface/cmsis-dap.cfg -f ~/openocd/tcl/target/rp2350.cfg -c "adapter speed 5000" -c "program mcuboot.elf verify reset exit"
          sleep 3

      - name: Install Flight Software
        run: |
          ~/openocd/src/openocd -s ~/openocd/tcl -f ~/openocd/tcl/interface/cmsis-dap.cfg -f ~/openocd/tcl/target/rp2350.cfg -c "adapter speed 5000" -c "program bootable.signed.hex verify reset exit"
          sleep 3

        # Reboot after installation to ensure power monitor tests work
      - name: Reboot Integration Cube
        if: env.KORAD_CONTROL == 'true'
        run: |
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 0
          sleep 3
          ~/korad_control/.venv/bin/python ~/korad_control/korad_control.py -d /dev/ttyPWR --output 1

      - name: Kill all python processes
        run: |
          pkill -9 python || true

      - name: Install Framer Plugin
        run: |
          make framer-plugin

      - name: Start GDS
        run: |
          nohup make gds-integration &
          echo $! > server.pid

      - name: Sync Sequence Number
        run: |
          make sync-sequence-number

      - name: Run Integration Tests
        run: |
          make test-integration

      - name: Kill GDS
        if: always()
        run: |
          kill $(cat server.pid) || true

      - name: Restore MDB to expected path
        run: |
          mkdir -p yamcs/yamcs-data/mdb
          if [ ! -f yamcs/yamcs-data/mdb/fprime.xtce.xml ]; then
            src=$(find . -name fprime.xtce.xml -print -quit)
            if [ -z "$src" ]; then
              echo "ERROR: fprime.xtce.xml not found in downloaded artifacts"
              exit 1
            fi
            cp "$src" yamcs/yamcs-data/mdb/fprime.xtce.xml
          fi

      - name: Start YAMCS Stack
        run: |
          nohup make yamcs UART_DEVICE=/dev/ttyBOARD > yamcs.log 2>&1 &
          echo $! > yamcs.pid

      - name: Run YAMCS Round-Trip Test
        run: |
          make test-yamcs

      - name: Stop YAMCS Stack
        if: always()
        run: |
          kill $(cat yamcs.pid) 2>/dev/null || true
          make yamcs-stop || true

      - name: Upload YAMCS log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yamcs-log
          path: yamcs.log
          retention-days: 7

  yamcs-build:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: artifacts

      - name: Restore MDB to expected path
        run: |
          mkdir -p yamcs/yamcs-data/mdb
          if [ ! -f yamcs/yamcs-data/mdb/fprime.xtce.xml ]; then
            src=$(find . -name fprime.xtce.xml -print -quit)
            if [ -z "$src" ]; then
              echo "ERROR: fprime.xtce.xml not found in downloaded artifacts"
              exit 1
            fi
            cp "$src" yamcs/yamcs-data/mdb/fprime.xtce.xml
          fi

      - name: Validate YAMCS server boots with current MDB
        run: |
          make yamcs-build-check
