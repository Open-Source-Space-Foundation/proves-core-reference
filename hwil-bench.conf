# HWIL bench overlay: disables MCUBoot for direct bare-metal flash at 0x10000000.
# Use only for bench sessions where the board does not have MCUBoot pre-installed.
# Revert: remove this file and regenerate with fprime-util generate -f.
# Do not commit to main.

CONFIG_BOOTLOADER_MCUBOOT=n
# Without MCUBoot we do not need the boot image management config.
CONFIG_MCUBOOT_BOOTUTIL_LIB=n
CONFIG_MCUBOOT_BOOTLOADER_MODE_SWAP_USING_OFFSET=n
CONFIG_MCUBOOT_BOOTLOADER_NO_DOWNGRADE=n
CONFIG_ROM_END_OFFSET=0
CONFIG_MCUBOOT_UPDATE_FOOTER_SIZE=0
CONFIG_USE_DT_CODE_PARTITION=n
CONFIG_FLASH_MAP=n
CONFIG_STREAM_FLASH=n
CONFIG_IMG_MANAGER=n
